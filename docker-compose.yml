services:
  backend:
    build: .
    env_file: .env
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - gradebee-data:/data

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/srv/frontend:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
  gradebee-data:
